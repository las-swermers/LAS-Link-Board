name: VoiceType Desktop — Build & Release

on:
  push:
    tags:
      - 'voicetype-v*'   # e.g. voicetype-v0.1.0

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install SoX (macOS)
        if: runner.os == 'macOS'
        run: brew install sox

      - name: Install dependencies
        working-directory: voicetype-desktop
        run: npm ci || npm install

      # ── macOS: Signed + Notarized build ──
      - name: Build & Sign Electron app (macOS)
        if: runner.os == 'macOS'
        working-directory: voicetype-desktop
        env:
          # Code signing — Developer ID Application certificate as base64 .p12
          CSC_LINK: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          # Notarization — called by scripts/notarize.js (afterSign hook)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --publish never

      # ── Windows build ──
      - name: Build Electron app (Windows)
        if: runner.os == 'Windows'
        working-directory: voicetype-desktop
        run: npx electron-builder --win --publish never
        shell: bash

      - name: Copy fix script to dist (macOS, unsigned fallback)
        if: runner.os == 'macOS'
        run: cp "voicetype-desktop/Fix VoiceType.command" "voicetype-desktop/dist/Fix VoiceType.command" 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voicetype-${{ matrix.os }}
          path: |
            voicetype-desktop/dist/*.dmg
            voicetype-desktop/dist/*.zip
            voicetype-desktop/dist/*.exe
            voicetype-desktop/dist/*.yml
            voicetype-desktop/dist/*.command

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VoiceType ${{ github.ref_name }}"
          body: |
            ## VoiceType Desktop ${{ github.ref_name }}

            ### Downloads
            - **macOS**: Download the `.dmg` file and drag VoiceType to Applications
            - **Windows**: Download the `.exe` installer and run it

            ### macOS Notes
            This build is **signed and notarized** by Apple — it should open without any Gatekeeper warnings.

            If your IT admin is deploying via Jamf, the PPPC profile in the repo
            (`voicetype-desktop/mdm/VoiceType-PPPC.mobileconfig`) pre-approves
            Microphone, Accessibility, and Apple Events permissions.

            ### Getting Started
            1. Sign in with your LinkBoard account
            2. Hold the hotkey to record, release to transcribe
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.command
